<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buat Password — ILP 2026 by ParagonCorp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body data-page="setPassword">
  <div class="auth-form bg-grid" style="min-height:100vh">
    <div class="card-auth">
      <span id="brand"></span>
      <h2 style="font-family:var(--font-display);font-size:26px;font-weight:700;margin-top:24px">Buat Password Anda</h2>
      <p class="stat-label mt-1">Lengkapi akun Anda untuk mulai mengikuti program.</p>
      <form id="pwForm" style="margin-top:24px">
        <div class="field"><label class="label">Password Baru</label><input class="input" name="password" type="password" required placeholder="Minimal 8 karakter" /></div>
        <div class="field"><label class="label">Konfirmasi Password</label><input class="input" name="confirm" type="password" required placeholder="Ulangi password" /></div>
        <div class="alert alert-error hidden" id="pwError"></div>
        <button class="btn btn-primary" style="width:100%" type="submit">Simpan & Masuk</button>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/auth.js"></script>
  <script src="scripts/main.js"></script>
  <script>document.getElementById("brand").innerHTML = logoHTML();</script>
</body>
</html>
